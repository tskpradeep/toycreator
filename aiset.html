<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI SET</title>

<style>
body{
margin:0;
background:#000;
color:#00ff00;
font-family:monospace;
}

.wrap{
padding:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:16px;
background:#000;
color:#00ff00;
border:1px solid #00ff00;
}

button{
padding:10px 20px;
background:#000;
color:#00ff00;
border:1px solid #00ff00;
cursor:pointer;
}

button:hover{
background:#00ff00;
color:#000;
}
</style>
</head>

<body>

<div class="wrap">

<h2>[ SYSTEM AI-SET : TOOL CONFIGURATION ]</h2>

<label>AVAILABLE VERSIONS</label>
<select id="model">
<option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
<option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
<option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
</select>

<label>API KEY</label>
<input type="password" id="key">

<label>API URL</label>
<input type="text" id="url" value="https://generativelanguage.googleapis.com/v1beta/models/">

<button onclick="saveData()">SAVE</button>

</div>

<script>
document.getElementById("key").value=localStorage.getItem("gemini_api_key")||"";
document.getElementById("model").value=localStorage.getItem("gemini_model")||"gemini-2.5-flash";
document.getElementById("url").value=localStorage.getItem("gemini_url")||"https://generativelanguage.googleapis.com/v1beta/models/";

function saveData(){
localStorage.setItem("gemini_api_key",document.getElementById("key").value);
localStorage.setItem("gemini_model",document.getElementById("model").value);
localStorage.setItem("gemini_url",document.getElementById("url").value);
window.close();
}
</script>

</body>
</html>
